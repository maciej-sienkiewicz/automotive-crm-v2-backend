spring.application.name=detailing-crm
  
  # Database
spring.datasource.url=jdbc:postgresql://${DB_ADDR:localhost}:${DB_PORT:5432}/${DB_NAME:detailing_crm}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
  
  # JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis
spring.data.redis.host=${REDIS_ADDR:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.session.store-type=redis

  # Server
server.port=8080

  # Logging
logging.level.root=INFO
logging.level.pl.detailing.crm=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

# Jackson
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# AWS S3 Configuration
aws.s3.region=us-east-1
aws.s3.bucket-name=detailing-crm-test
aws.s3.access-key=${S3_ACCESS_KEY}
aws.s3.secret-key=${S3_SECRET_KEY}

# Multipart / file upload limits
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Photo Upload Configuration
photo-upload.session-ttl-hours=2
photo-upload.max-photos-per-session=20

# Checkin QR Upload Configuration
# TTL for upload tokens stored in Redis (hours); also controls S3 delete-after tag value
checkin.upload-token-ttl-hours=3

# KSeF Integration (production)
# Test:       https://api-test.ksef.mf.gov.pl
# Production: https://api.ksef.mf.gov.pl
ksef.base-url=https://api.ksef.mf.gov.pl
ksef.api-path=/api/v2
ksef.request-timeout-seconds=30

# KSeF Background Sync
# interval-ms      – co ile ms uruchamiany jest kolejny sync (domyslnie 15 min = 900 000 ms)
# initial-delay-ms – opoznienie pierwszego uruchomienia po starcie aplikacji (domyslnie 60 s)
ksef.sync.interval-ms=900000
ksef.sync.initial-delay-ms=60000

# Instagram Competitor Tracker – RapidAPI (ig-scraper5)
# Klucz RapidAPI – ustaw przez zmienna srodowiskowa RAPIDAPI_KEY w produkcji
instagram.rapidapi.key=${RAPIDAPI_KEY:908109b9d0msh50b482e736f8aecp13149cjsnf0e361c0f26d}
instagram.rapidapi.host=ig-scraper5.p.rapidapi.com
instagram.rapidapi.timeout-seconds=30

# Instagram sync – cron niedzielny o 03:00
# Format Spring: sekunda minuta godzina dzien miesiac dzien-tygodnia
instagram.sync.cron=0 0 3 * * SUN

# SMSAPI Integration (smsapi-lib:3.0.1)
# oauth-token – OAuth token from the SMSAPI panel; set via env var SMSAPI_OAUTH_TOKEN in production
# sender-name – Alphanumeric sender ID registered in SMSAPI panel; leave empty for default sender
# api-url     – Gateway URL: https://api.smsapi.pl/ (PL) | https://api.smsapi.com/ (COM) | https://smsapi.io/ (SE/BG)
# enabled     – Set to true in production to actually dispatch SMS messages
# whitelist   – TEST PHASE ONLY: comma-separated E.164 numbers allowed to receive SMS;
#               empty = whitelist disabled (all numbers allowed); remove/leave empty in production
smsapi.oauth-token=${ENV_SMSAPI_OAUTH_TOKEN:}
smsapi.sender-name=Test
smsapi.api-url=https://api.smsapi.pl/
smsapi.enabled=true
smsapi.whitelist=+48888915358,+48508143527

# Email / JavaMail (transactional mail – welcome email + protocol attachment)
# host     – SMTP server hostname; override with env var MAIL_HOST in production
# port     – SMTP port (587 = STARTTLS, 465 = SSL/TLS, 25 = plain)
# username – SMTP account login; override with env var MAIL_USERNAME
# password – SMTP account password; override with env var MAIL_PASSWORD
# enabled  – Set to false to only log messages without sending (dev/test)
email.javamail.host=${MAIL_HOST:serwer2486743.home.pl}
email.javamail.port=${MAIL_PORT:587}
email.javamail.username=${MAIL_USERNAME:crm1@sienkiewicz-maciej.pl}
email.javamail.password=${MAIL_PASSWORD:haslo123!}
email.javamail.smtp-auth=true
email.javamail.smtp-starttls-enable=true
email.javamail.enabled=true

# 2-way SMS (consent requests for service scope changes)
# To enable inbound replies, configure the callback URL in the SMSAPI panel:
#   Account → Settings → 2-way SMS → Callback URL
#   → https://<your-domain>/api/sms/inbound
# SMSAPI will POST inbound customer replies to that URL.
# No additional properties are required here — the endpoint is already registered.

# ─── Instagram AI Post Generation ──────────────────────────────────────────────
# OpenAI API – ustaw przez zmienną środowiskową OPENAI_API_KEY w produkcji
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
# Embedding model (text-embedding-3-small: 1536 dims)
spring.ai.openai.embedding.options.model=text-embedding-3-small

# pgvector – baza wektorowa dla Few-Shot przykładów
# Tabela: instagram_post_vectors (osobna od innych VectorStore)
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema-name=public
spring.ai.vectorstore.pgvector.table-name=instagram_post_vectors

# Audio transcription (Whisper) – voice-to-text for mobile app
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.language=pl

# Logowanie modułu AI
logging.level.org.springframework.ai=INFO
logging.level.pl.detailing.crm.instagram.ai=DEBUG

# ─── CloudFlare Email Webhook ───────────────────────────────────────────────────
# Shared secret token sent by CloudFlare Email Workers in the X-Cloudflare-Email-Token header.
# REQUIRED in production — set via env var CLOUDFLARE_EMAIL_WEBHOOK_TOKEN.
# If left empty, the webhook endpoint will reject ALL requests with HTTP 401.
cloudflare.email.webhook.secret-token=${CLOUDFLARE_EMAIL_WEBHOOK_TOKEN:}

# ─── Observability: Spring Boot Actuator + Micrometer / Prometheus ────────────
# Expose health, info and the Prometheus scrape endpoint
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true

# Disable default Spring MVC http.server.requests timer (we instrument via AOP)
management.metrics.web.server.request.autotime.enabled=false

# ── crm.api.request.duration – latency histogram with p50 / p95 / p99 ─────────
# Enables Prometheus-native histogram buckets (required for histogram_quantile())
management.metrics.distribution.percentiles-histogram.crm.api.request.duration=true
# Pre-compute client-side quantiles (available without Prometheus histogram_quantile)
management.metrics.distribution.percentiles.crm.api.request.duration=0.5,0.95,0.99
# SLO buckets that drive latency heatmaps and error-budget alerts
management.metrics.distribution.slo.crm.api.request.duration=50ms,100ms,250ms,500ms,1s,2500ms,5s,10s

# ── crm.api.response.size – byte distribution for security anomaly detection ───
management.metrics.distribution.percentiles-histogram.crm.api.response.size=true
management.metrics.distribution.percentiles.crm.api.response.size=0.5,0.95,0.99

# ── Common tags appended to every metric emitted by this service ──────────────
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${APP_ENV:local}

# ── GUS BIR Integration ───────────────────────────────────────────────────────
# Test env key (well-known): abcde12345abcde12345
# Production: ustaw zmienną środowiskową GUS_API_KEY
gus.api-key=${GUS_API_KEY:abcde12345abcde12345}
# Endpoint produkcyjny (domyślny). Testowy: https://wyszukiwarkaregontest.stat.gov.pl/wsBIR/UslugaBIRzewnPubl.svc
gus.endpoint-url=${GUS_ENDPOINT_URL:https://wyszukiwarkaregon.stat.gov.pl/wsBIR/UslugaBIRzewnPubl.svc}
gus.connect-timeout-ms=5000
gus.read-timeout-ms=15000
# Sesja GUS wygasa po 60 min – odświeżamy po 55 min z marginesem bezpieczeństwa
gus.session-ttl-minutes=55
# Cache Redis – dane firm rzadko się zmieniają (default: 24 h)
gus.cache-ttl-hours=24
gus.retry-max-attempts=3
gus.retry-initial-delay-ms=1000
gus.circuit-breaker-failure-rate-threshold=50
gus.circuit-breaker-wait-duration-seconds=60
gus.circuit-breaker-sliding-window-size=10