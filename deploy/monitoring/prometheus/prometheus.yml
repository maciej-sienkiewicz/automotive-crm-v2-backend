global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    environment: 'production'

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'detailing-crm'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['detailing-crm-backend:8080']
        labels:
          application: 'detailing-crm'
