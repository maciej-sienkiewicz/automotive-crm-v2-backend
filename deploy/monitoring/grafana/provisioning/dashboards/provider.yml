apiVersion: 1

providers:
  - name: 'CRM Dashboards'
    orgId: 1
    folder: 'Detailing CRM'
    folderUid: 'detailing-crm'
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
