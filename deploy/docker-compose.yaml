services:
  detailing-crm-backend:
    image: ${ENV_DETAILING_CRM_BACKEND_IMAGE}
    container_name: ${DETAILING_CRM_BACKEND_CONTAINER_NAME}
    ports:
      - '${ENV_DETAILING_CRM_BACKEND_EXTERNAL_PORT}:8080'
      - '${ENV_DETAILING_CRM_BACKEND_DEBUG_PORT}:5005'
    restart: always
    environment:
      DB_ADDR: ${ENV_DB_ADDR}
      DB_PORT: ${ENV_DB_PORT}
      DB_NAME: ${ENV_DB_NAME}
      DB_USER: ${ENV_DB_USER}
      DB_PASSWORD: ${ENV_DB_PASSWORD}
      REDIS_ADDR: ${ENV_REDIS_ADDR}
      REDIS_PORT: ${ENV_REDIS_PORT}
      S3_ACCESS_KEY: ${ENV_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${ENV_S3_SECRET_KEY}
      GITHUB_ACTOR: ${ENV_GITHUB_ACTOR}
      GITHUB_TOKEN: ${ENV_GITHUB_TOKEN}
      OPENAI_API_KEY: ${ENV_OPENAI_API_KEY}
      SMSAPI_OAUTH_TOKEN: ${ENV_SMSAPI_OAUTH_TOKEN}
      CLOUDFLARE_EMAIL_WEBHOOK_TOKEN: ${ENV_CLOUDFLARE_EMAIL_WEBHOOK_TOKEN}
      APP_ENV: ${ENV_APP_ENV:-production}
      GUS_API_KEY: ${ENV_GUS_API_KEY}
      ENV_GUS_ENDPOINT_URL: ${ENV_GUS_ENDPOINT_URL}
      MAIL_USERNAME: ${ENV_MAIL_USERNAME}
      MAIL_PASSWORD: ${ENV_MAIL_PASSWORD}
    depends_on:
      - redis
    networks:
      - network

  redis:
    image: redis:alpine
    networks:
      - network

  # ── Observability Stack ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: detailing-crm-prometheus
    restart: unless-stopped
    ports:
      - "${ENV_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: detailing-crm-grafana
    restart: unless-stopped
    ports:
      - "${ENV_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${ENV_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${ENV_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${ENV_GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_LOG_LEVEL: "error"
      GF_LOG_FILTERS: "rendering:error provisioning.dashboard:critical"
    depends_on:
      - prometheus
    networks:
      - network

volumes:
  prometheus_data:
  grafana_data:

networks:
  network:
    name: ${ENV_NETWORK}
    external: true
